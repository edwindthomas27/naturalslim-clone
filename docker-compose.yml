services:
  db:
    image: postgres:15-alpine
    container_name: naturalslim_db
    environment:
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
      POSTGRES_DB: postgres
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 5s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:17.0
    container_name: naturalslim_odoo
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
    volumes:
      - ./addons:/mnt/extra-addons
      - ./odoo.conf:/etc/odoo/odoo.conf
      - odoo_filestore:/var/lib/odoo
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    command: ["--config=/etc/odoo/odoo.conf"]

  frontend:
    image: node:20
    container_name: naturalslim_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_ODOO_API_URL=http://localhost:8069
      # Desde dentro del contenedor, Odoo se alcanza por el nombre del servicio
      - VITE_PROXY_TARGET=http://odoo:8069
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    stdin_open: true
    tty: true

volumes:
  odoo_db_data:
  odoo_filestore:
  frontend_node_modules:
